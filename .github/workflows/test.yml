name: test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r quant_collector_app/requirements.txt

    - name: Compile Python modules
      run: |
        python -m compileall -q quant_collector_app tests

    - name: Run tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest -q --tb=short

    - name: Run core self check
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m quant_collector_app.self_check --core

  build-clean-release:
    runs-on: windows-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r quant_collector_app/requirements.txt

    - name: Build clean release
      run: |
        python scripts/clean_release.py --output dist/QuantReplayCollector-CI

    - name: Verify clean release content
      run: |
        python scripts/check_release_clean.py dist/QuantReplayCollector-CI

    - name: Upload clean release artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantReplayCollector-Clean
        path: dist/QuantReplayCollector-CI/
        retention-days: 7
