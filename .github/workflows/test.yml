name: test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r quant_collector_app/requirements.txt

    - name: Verify Qt platform
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -c "import os; print('QT_QPA_PLATFORM:', os.environ.get('QT_QPA_PLATFORM')); from PySide6 import QtWidgets; app = QtWidgets.QApplication([]); print('QApplication created successfully')"

    - name: Compile Python modules
      run: |
        python -m compileall -q quant_collector_app tests

    - name: Find broken test imports
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python find_broken_test_import.py

    - name: Check pytest collection
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest --collect-only -q
      continue-on-error: true

    - name: Run smoke tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest tests/test_import_smoke.py tests/test_lazy_imports.py tests/test_storage_no_import_side_effect.py -v --tb=short

    - name: Run all tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest -v --tb=short --maxfail=1 -rA

    - name: Run core self check
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m quant_collector_app.self_check --core

  build-clean-release:
    runs-on: windows-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r quant_collector_app/requirements.txt

    - name: Build clean release
      run: |
        python scripts/clean_release.py --output dist/QuantReplayCollector-CI

    - name: Verify clean release content
      run: |
        python scripts/check_release_clean.py dist/QuantReplayCollector-CI

    - name: Upload clean release artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantReplayCollector-Clean
        path: dist/QuantReplayCollector-CI/
        retention-days: 7
